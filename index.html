<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Order</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #ffffff;
    padding: 16px;
    color: #000000;
  }

  h1 {
    text-align: center;
    font-size: 2rem;
    font-weight: bold;
    color: #000;
    margin-bottom: 6px;
  }

  .subtitle {
    text-align: center;
    font-size: 1.3rem;
    color: #333;
    margin-bottom: 24px;
  }

  .section {
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 1.5rem;
    font-weight: bold;
    color: #000;
    margin-bottom: 12px;
    display: block;
  }

  input[type="text"] {
    width: 100%;
    padding: 18px;
    font-size: 1.5rem;
    border: 3px solid #000;
    border-radius: 10px;
    outline: none;
    background: #fff;
    color: #000;
  }

  input[type="text"]:focus {
    border-color: #0044cc;
    background: #f0f4ff;
  }

  .item-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 10px;
    border-bottom: 2px solid #ddd;
    background: #fff;
  }

  .item-row.selected {
    background: #e6f0ff;
  }

  .item-name {
    font-size: 1.4rem;
    font-weight: bold;
    color: #000;
    flex: 1;
  }

  .qty-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .qty-btn {
    width: 54px;
    height: 54px;
    border-radius: 8px;
    border: 3px solid #000;
    font-size: 2rem;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  .qty-btn.minus {
    background: #ffdddd;
    color: #990000;
    border-color: #990000;
  }

  .qty-btn.plus {
    background: #ddffdd;
    color: #006600;
    border-color: #006600;
  }

  .qty-display {
    font-size: 1.8rem;
    font-weight: bold;
    color: #000;
    min-width: 36px;
    text-align: center;
  }

  textarea {
    width: 100%;
    padding: 16px;
    font-size: 1.4rem;
    border: 3px solid #000;
    border-radius: 10px;
    font-family: Arial, sans-serif;
    resize: none;
    outline: none;
    color: #000;
  }

  textarea:focus {
    border-color: #0044cc;
    background: #f0f4ff;
  }

  .summary-box {
    background: #f5f5f5;
    border: 3px solid #000;
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 18px;
    font-size: 1.3rem;
    color: #000;
    line-height: 2;
  }

  .send-btn {
    display: block;
    width: 100%;
    padding: 22px;
    background: #006600;
    color: #ffffff;
    border: none;
    border-radius: 12px;
    font-size: 1.8rem;
    font-weight: bold;
    font-family: Arial, sans-serif;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }

  .send-btn.disabled {
    background: #999;
    color: #ddd;
    cursor: not-allowed;
    pointer-events: none;
  }

  .manager-label {
    text-align: center;
    font-size: 1.1rem;
    color: #555;
    margin-top: 12px;
  }

  hr {
    border: none;
    border-top: 2px solid #ccc;
    margin: 24px 0;
  }
</style>
</head>
<body>

<h1>STOCK ORDER</h1>
<p class="subtitle">Send your order to Tomasz</p>

<hr>

<div class="section">
  <label class="section-label" for="name">YOUR NAME</label>
  <input type="text" id="name" placeholder="Type your name here" oninput="updateSummary()">
</div>

<hr>

<div class="section">
  <span class="section-label">WHAT DO YOU NEED?</span>
  <div id="items-list"></div>
</div>

<hr>

<div class="section">
  <label class="section-label" for="note">EXTRA NOTES (optional)</label>
  <textarea id="note" rows="3" placeholder="e.g. Urgent / specific brand..." oninput="updateSummary()"></textarea>
</div>

<hr>

<div class="section">
  <span class="section-label">YOUR ORDER SUMMARY</span>
  <div class="summary-box" id="summary">Please enter your name and choose at least one item.</div>
  <a class="send-btn disabled" id="send-btn" href="#" onclick="return false;">SEND TO TOMASZ</a>
  <p class="manager-label">Will be sent to: Tomasz Wierzbicki</p>
</div>

<script>
  const MANAGER_WHATSAPP = "33600000000"; // PUT TOMASZ'S NUMBER HERE (country code, no + sign)

  const ITEMS = [
    "Gloves M",
    "Gloves L",
    "Gloves XL",
    "White rags",
    "Microfibre cloth",
    "Squeeze",
    "Shampoo",
    "Degreaser",
    "Antibacterial gel",
    "Green pads",
    "Scraper (metal)",
    "Scraper (plastic)",
    "Weed brush (small)",
    "Weed brush (long handle)",
    "T-bar",
    "T-bar cover",
    "Graffiti remover",
  ];

  const quantities = {};
  ITEMS.forEach(item => quantities[item] = 0);

  function safe(name) { return name.replace(/[^a-zA-Z0-9]/g, "_"); }

  function buildList() {
    const list = document.getElementById("items-list");
    ITEMS.forEach(item => {
      const id = safe(item);
      const row = document.createElement("div");
      row.className = "item-row";
      row.id = "row-" + id;
      row.innerHTML = `
        <div class="item-name">${item}</div>
        <div class="qty-controls">
          <button class="qty-btn minus" onclick="changeQty('${item}', -1)">?</button>
          <div class="qty-display" id="qty-${id}">0</div>
          <button class="qty-btn plus" onclick="changeQty('${item}', +1)">+</button>
        </div>
      `;
      list.appendChild(row);
    });
  }

  function changeQty(name, delta) {
    quantities[name] = Math.max(0, quantities[name] + delta);
    const id = safe(name);
    document.getElementById("qty-" + id).textContent = quantities[name];
    document.getElementById("row-" + id).className = quantities[name] > 0 ? "item-row selected" : "item-row";
    updateSummary();
  }

  function updateSummary() {
    const name = document.getElementById("name").value.trim();
    const note = document.getElementById("note").value.trim();
    const ordered = ITEMS.filter(i => quantities[i] > 0);
    const summaryEl = document.getElementById("summary");
    const sendBtn = document.getElementById("send-btn");

    if (!name || ordered.length === 0) {
      summaryEl.innerHTML = "Please enter your name and choose at least one item.";
      sendBtn.className = "send-btn disabled";
      sendBtn.href = "#";
      sendBtn.onclick = function(){ return false; };
      return;
    }

    let lines = ["<b>Name: " + name + "</b>"];
    ordered.forEach(i => lines.push(i + ": <b>" + quantities[i] + "</b>"));
    if (note) lines.push("Note: " + note);
    summaryEl.innerHTML = lines.join("<br>");

    let msg = "STOCK ORDER\n";
    msg += "To: Tomasz Wierzbicki\n";
    msg += "From: " + name + "\n\n";
    msg += "Items:\n";
    ordered.forEach(i => msg += "- " + i + ": " + quantities[i] + "\n");
    if (note) msg += "\nNote: " + note;
    msg += "\n\nDate: " + new Date().toLocaleDateString("en-GB");

    sendBtn.className = "send-btn";
    sendBtn.href = "https://wa.me/" + MANAGER_WHATSAPP + "?text=" + encodeURIComponent(msg);
    sendBtn.onclick = null;
  }

  buildList();
</script>
</body>
</html>
